weather_dw_profile:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', 'localhost') }}"
      port: "{{ env_var('POSTGRES_PORT', '5433') | as_number }}"
      user: "{{ env_var('POSTGRES_USER', 'dbt_user') }}"
      pass: "{{ env_var('POSTGRES_PASSWORD', 'dbt_pass') }}"
      dbname: "{{ env_var('POSTGRES_DB', 'weather_dw') }}"
      schema: public # Default schema, will be overridden by model configs
      threads: 4
      connect_timeout: 10
