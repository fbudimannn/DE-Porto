services:
  postgres:
    image: postgres:12.6
    container_name: weather_dw_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: weather_dw
      POSTGRES_USER: dbt_user
      POSTGRES_PASSWORD: dbt_pass
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dbt_user -d weather_dw"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
    driver: local
